<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>دخول - نظام سند</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f2f5; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 350px; text-align: center; }
        h2 { color: #1a73e8; margin-bottom: 20px; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        .btn { width: 100%; padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; margin-top: 10px; color: white; transition: 0.3s; }
        .btn-doctor { background-color: #2c3e50; }
        .btn-student { background-color: #27ae60; }
    </style>
</head>
<body>
    <div class="card">
        <h2>🎓 نظام قياس النجاح</h2>
        <form action="/login_check" method="POST">
            <input type="email" name="email" placeholder="الإيميل الجامعي" required>
            <input type="password" name="password" placeholder="كلمة المرور" required>
            <button type="submit" name="role" value="doctor" class="btn btn-doctor">دخول كـ دكتور</button>
            <button type="submit" name="role" value="student" class="btn btn-student">دخول كـ طالب</button>
        </form>
    </div>
</body>
</html>
